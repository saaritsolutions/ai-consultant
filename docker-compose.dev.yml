version: '3.9'

# Development override — runs only PostgreSQL so you can run frontend/backend locally.
services:
  postgres:
    image: postgres:16-alpine
    container_name: aiconsultant_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiconsultant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

volumes:
  postgres_data_dev:
