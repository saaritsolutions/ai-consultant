version: '3.9'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aiconsultant_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiconsultant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No host port binding — DB is internal only
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aiconsultant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: AiConsultant.API/Dockerfile
    container_name: aiconsultant_backend
    restart: unless-stopped
    # No host port binding — accessed through frontend nginx proxy
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - JwtSettings__SecretKey=${JwtSettings__SecretKey}
      - JwtSettings__Issuer=${JwtSettings__Issuer:-AiConsultantAPI}
      - JwtSettings__Audience=${JwtSettings__Audience:-AiConsultantClient}
      - JwtSettings__ExpirationHours=${JwtSettings__ExpirationHours:-24}
      - AdminSettings__Email=${AdminSettings__Email}
      - AdminSettings__Password=${AdminSettings__Password}
      - AllowedOrigins=${AllowedOrigins}
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: aiconsultant_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
