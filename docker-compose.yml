version: '3.9'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aiconsultant_db
    restart: unless-stopped
    # env_file passes values LITERALLY (no $ interpolation) — critical for
    # passwords that contain $ signs.
    env_file: .env.production
    environment:
      # These two are not in .env.production, so set them directly.
      POSTGRES_DB: aiconsultant
      POSTGRES_USER: postgres
      # POSTGRES_PASSWORD comes from env_file as a literal value.
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aiconsultant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: AiConsultant.API/Dockerfile
    container_name: aiconsultant_backend
    restart: unless-stopped
    expose:
      - "8080"
    # env_file passes all values literally — ConnectionStrings, JwtSettings, etc.
    # are forwarded to the container as-is, with no $ interpolation.
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: aiconsultant_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
